<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Outfit:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <title>Frontend Mentor | Blog preview card</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
      body {
        background-color: hsl(47, 88%, 63%);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
      .card {
        background-color: hsl(0, 0%, 100%);
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        justify-content: left;
        padding: 24px;
        width: clamp(17.4375rem, 16rem + 6vw, 21rem);
        height: 474px;
        row-gap: 24px;
        box-shadow: 8px 8px 0 0 rgba(0, 0, 0, 1);
      }
      .card img {
        width: 100%;
        height: 200px;
        border-radius: 10px;
        object-fit: cover;
      }
      .card-content {
        display: flex;
        flex-direction: column;
        row-gap: 12px;
      }
      .card-content-title {
        font-size: clamp(0.75rem, 0.706rem + 0.1878vw, 0.875rem);
        font-weight: 800;
        font-family: "Figtree", sans-serif;
        padding: 4px 12px 4px 12px;
        background-color: hsl(47, 88%, 63%);
        border-radius: 4px;
        width: fit-content;
        margin: 0;
      }
      .card-content h2 {
        font-size: clamp(0.75rem, 0.706rem + 0.1878vw, 0.875rem);
        font-weight: 400;
        line-height: 150%;
        font-family: "Figtree", sans-serif;
        text-align: left;
        margin: 0;
      }
      .card-content h1 {
        font-size: clamp(1.25rem, 1.162rem + 0.3756vw, 1.5rem);
        font-weight: 800;
        line-height: 150%;
        font-family: "Figtree", sans-serif;
        text-align: left;
        margin: 0;
      }
      .card-content h1:hover {
        color: hsl(47, 88%, 63%);
      }
      .card-content p {
        font-size: clamp(0.875rem, 0.831rem + 0.1878vw, 1rem);
        font-weight: 400;
        line-height: 150%;
        font-family: "Figtree", sans-serif;
        color: rgba(107, 107, 107, 1);
        text-align: left;
        margin: 0;
      }
      .card-footer {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 0;
      }
      .card-footer img {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        margin-bottom: 0;
      }
      .card-footer h3 {
        font-size: 14px;
        font-weight: 800;
        line-height: 150%;
        font-family: "Figtree", sans-serif;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <img src="./assets/images/illustration-article.svg" alt="pic" />
      <div class="card-content">
        <div class="card-content-title">Learning</div>
        <h2>Published 28 Feb 2026</h2>
        <h1>HTML & CSS foundations</h1>
        <p>
          These languages are the backbone of every website, defining structure,
          content, and presentation.
        </p>
      </div>
      <div class="card-footer">
        <img src="./assets/images/image-avatar.webp" alt="avatar" />
        <h3>Greg Hooper</h3>
      </div>
    </section>
  </body>
</html>
